name: Deploy to HuggingFace

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git Identity
          git config --global user.email "hitmanmit1996@gmail.com"
          git config --global user.name "Akash671"

          # 1. Clone the Space using your token for authentication
          git clone https://Akash671:$HF_TOKEN@huggingface.co/spaces/Akash671/cnn-image-classifier hf-space

          # 2. Sync local files to the cloned folder, excluding the .git metadata
          rsync -av --exclude '.git' ./ hf-space/

          cd hf-space

          # 3. Initialize Git LFS and track the specific binary files that were rejected
          git lfs install
          git lfs track "*.keras"
          git lfs track "*.PNG"
          git lfs track "*.png"
          git add .gitattributes

          # 4. Finalize authentication and push
          git remote set-url origin https://Akash671:$HF_TOKEN@huggingface.co/spaces/Akash671/cnn-image-classifier
          git add .
          git commit -m "Auto deploy with Git LFS for binary files" || echo "No changes to commit"
          
          # Force push may be required if history has diverged
          git push origin main
